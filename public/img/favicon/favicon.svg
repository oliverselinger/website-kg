  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylized S path -->
  <path d="M 310 148 C 310 148 280 112 220 112 C 160 112 120 152 120 196 C 120 280 280 248 280 316 C 280 352 248 400 188 400 C 128 400 96 364 96 364"
